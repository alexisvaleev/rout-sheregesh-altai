name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web

      - name: Add .nojekyll + SPA routing
        run: |
          touch dist/.nojekyll

          # 404.html — сохраняет путь и редиректит на главную
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting...</title>
            <script>
              sessionStorage.setItem('spa:path', window.location.pathname.replace(/^\/[^/]+/, '') + window.location.search + window.location.hash);
              window.location.replace('/rout-sheregesh-altai/');
            </script>
          </head>
          <body></body>
          </html>
          EOF

          # Инжектим скрипт восстановления пути в index.html
          node -e "
            const fs = require('fs');
            const path = 'dist/index.html';
            let html = fs.readFileSync(path, 'utf8');
            const script = \`<script>
            (function() {
              var saved = sessionStorage.getItem('spa:path');
              if (saved && saved !== '/') {
                sessionStorage.removeItem('spa:path');
                var base = '/rout-sheregesh-altai';
                history.replaceState(null, '', base + saved);
              }
            })();
            </script>\`;
            html = html.replace('</head>', script + '</head>');
            fs.writeFileSync(path, html);
            console.log('SPA routing injected into index.html');
          "
          echo "SPA routing setup done"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
